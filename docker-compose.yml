version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: stellar_escrow
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://indexer:password@postgres:5432/stellar_escrow
      # CDN cache purge — set these to your CDN provider's purge API
      - CDN_PURGE_URL=${CDN_PURGE_URL:-}
      - CDN_PURGE_TOKEN=${CDN_PURGE_TOKEN:-}
    depends_on:
      - postgres
    command: ["./indexer", "--config", "config.toml"]

volumes:
  postgres_data: